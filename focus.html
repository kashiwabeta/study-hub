<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="集中">
<title>集中 · 番茄钟</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700;800&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#2b2724; --ink-soft:#6b635c; --paper:#f4efe6; --paper-2:#ece4d6;
    --card:#fbf8f1; --line:#ddd2bf; --accent:#c1543a; --accent-d:#a8412b;
    --green:#5f7a52; --gold:#c89b4a;
    --shadow:0 1px 0 rgba(255,255,255,.7) inset, 0 14px 36px -18px rgba(60,45,30,.4);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{-webkit-text-size-adjust:100%}
  body{background:var(--paper);color:var(--ink);min-height:100vh;
    font-family:'Zen Maru Gothic',sans-serif;-webkit-font-smoothing:antialiased;
    background-image:radial-gradient(circle at 50% -10%, #f9f4ea, var(--paper) 55%);
    padding:0 0 60px;transition:background .6s}
  body.resting{background-image:radial-gradient(circle at 50% -10%, #eef2e9, #e8ede1 55%)}
  .wrap{max-width:520px;margin:0 auto;padding:0 24px}

  header{padding:40px 0 6px;text-align:center;position:relative}
  .back{position:absolute;left:0;top:42px;font-family:'Shippori Mincho',serif;font-size:12px;
    color:var(--accent-d);text-decoration:none;letter-spacing:.1em}
  .mark{font-family:'Shippori Mincho',serif;font-size:12px;letter-spacing:.5em;color:var(--accent-d);
    text-transform:uppercase;margin-bottom:8px}
  h1{font-family:'Shippori Mincho',serif;font-weight:800;font-size:40px;letter-spacing:.1em}

  /* timer ring */
  .timer{margin:30px auto 8px;width:280px;height:280px;position:relative}
  .timer svg{transform:rotate(-90deg)}
  .ring-bg{fill:none;stroke:var(--paper-2);stroke-width:14}
  .ring-fg{fill:none;stroke:var(--accent);stroke-width:14;stroke-linecap:round;
    transition:stroke-dashoffset .5s linear, stroke .5s}
  body.resting .ring-fg{stroke:var(--green)}
  .timer .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .timer .time{font-family:'Shippori Mincho',serif;font-weight:700;font-size:62px;letter-spacing:.02em;line-height:1}
  .timer .phase{font-size:13px;color:var(--ink-soft);margin-top:8px;letter-spacing:.2em}
  body.resting .phase{color:var(--green)}

  .controls{display:flex;gap:12px;justify-content:center;margin-top:18px}
  .btn{font-family:'Shippori Mincho',serif;font-size:16px;font-weight:600;border:none;border-radius:13px;
    padding:14px 38px;cursor:pointer;letter-spacing:.1em;transition:.2s}
  .btn.primary{background:var(--accent);color:#fff;box-shadow:0 8px 20px -8px var(--accent)}
  body.resting .btn.primary{background:var(--green);box-shadow:0 8px 20px -8px var(--green)}
  .btn.primary:hover{transform:translateY(-2px)}
  .btn.ghost{background:transparent;color:var(--ink-soft);border:1px solid var(--line)}
  .btn.ghost:hover{border-color:var(--accent);color:var(--accent)}

  .lengths{display:flex;gap:8px;justify-content:center;margin-top:16px}
  .lengths button{font-family:inherit;font-size:12px;border:1px solid var(--line);background:var(--card);
    color:var(--ink-soft);border-radius:9px;padding:6px 13px;cursor:pointer;transition:.18s}
  .lengths button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .lengths .sep{align-self:center;color:var(--line);font-size:11px}

  /* stats */
  .stats{display:flex;gap:12px;justify-content:center;margin-top:30px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:16px 20px;
    text-align:center;box-shadow:var(--shadow);min-width:96px}
  .stat .n{font-family:'Shippori Mincho',serif;font-size:28px;font-weight:700;color:var(--accent);line-height:1}
  .stat .l{font-size:11px;color:var(--ink-soft);margin-top:6px;letter-spacing:.06em}

  .week{margin-top:24px;background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:18px 20px;box-shadow:var(--shadow)}
  .week h3{font-family:'Shippori Mincho',serif;font-size:15px;margin-bottom:14px}
  .bars{display:flex;align-items:flex-end;gap:8px;height:90px}
  .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
  .bar{width:100%;max-width:30px;background:linear-gradient(180deg,var(--accent),#d97a62);
    border-radius:5px 5px 0 0;min-height:3px;transition:height .4s;position:relative}
  .bar span{position:absolute;top:-17px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--ink-soft)}
  .bar-col .day{font-size:10.5px;color:var(--ink-soft)}
  .bar-col.today .day{color:var(--accent);font-weight:700}

  footer{text-align:center;margin-top:30px;color:var(--ink-soft);font-size:11.5px}
  footer .q{font-family:'Shippori Mincho',serif;font-size:13px;color:var(--ink);margin-bottom:5px}

  .toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(120px);
    background:var(--ink);color:#fbf8f1;padding:15px 28px;border-radius:14px;font-size:14px;
    box-shadow:0 12px 30px -8px rgba(0,0,0,.4);transition:.4s cubic-bezier(.2,1.3,.4,1);z-index:50;
    font-family:'Shippori Mincho',serif;letter-spacing:.05em}
  .toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <a class="back" href="index.html">← 学習ハブ</a>
    <div class="mark">Focus</div>
    <h1 id="title">集中</h1>
  </header>

  <div class="timer">
    <svg width="280" height="280" viewBox="0 0 280 280">
      <circle class="ring-bg" cx="140" cy="140" r="124"/>
      <circle class="ring-fg" id="ring" cx="140" cy="140" r="124"/>
    </svg>
    <div class="center">
      <div class="time" id="time">25:00</div>
      <div class="phase" id="phase">専注</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn primary" id="startBtn">開始</button>
    <button class="btn ghost" id="resetBtn">重置</button>
  </div>

  <div class="lengths">
    <button data-focus="15">15</button>
    <button data-focus="25" class="on">25</button>
    <button data-focus="45">45</button>
    <span class="sep">专注 / 休息</span>
    <button data-rest="5" class="on">5</button>
    <button data-rest="10">10</button>
  </div>

  <div class="stats">
    <div class="stat"><div class="n" id="todayCount">0</div><div class="l">今日番茄</div></div>
    <div class="stat"><div class="n" id="todayMin">0</div><div class="l">今日专注(分)</div></div>
    <div class="stat"><div class="n" id="totalCount">0</div><div class="l">累计番茄</div></div>
  </div>

  <div class="week">
    <h3>近 7 天专注番茄</h3>
    <div class="bars" id="bars"></div>
  </div>

  <footer>
    <div class="q">一度に一つのことを</div>
    一次只做一件事，番茄响之前不碰别的。
  </footer>
</div>
<div class="toast" id="toast"></div>

<script>
const KEY='jp_pomodoro_v1';
const $=s=>document.querySelector(s);
const todayStr=()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`};

let state;
try{state=JSON.parse(localStorage.getItem(KEY))||null;}catch(e){state=null;}
if(!state) state={days:{},total:0};

let focusLen=25, restLen=5;
let phase='focus';        // 'focus' | 'rest'
let remaining=focusLen*60;
let running=false, ticker=null;
const R=124, CIRC=2*Math.PI*R;
$('#ring').style.strokeDasharray=CIRC;

function fmt(s){const m=Math.floor(s/60),ss=s%60;return `${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`}
function totalForPhase(){return (phase==='focus'?focusLen:restLen)*60}

function paint(){
  $('#time').textContent=fmt(remaining);
  const frac=remaining/totalForPhase();
  $('#ring').style.strokeDashoffset=CIRC*(1-frac);
  $('#phase').textContent=phase==='focus'?'専注':'休息';
  $('#title').textContent=phase==='focus'?'集中':'休憩';
  document.body.classList.toggle('resting',phase==='rest');
  $('#startBtn').textContent=running?'暂停':(remaining<totalForPhase()?'继续':'開始');
}

function tick(){
  remaining--;
  if(remaining<=0){ finishPhase(); return; }
  paint();
}

function finishPhase(){
  stop();
  beep();
  if(phase==='focus'){
    // 记一个完成的番茄
    const t=todayStr();
    state.days[t]=state.days[t]||{count:0,min:0};
    state.days[t].count+=1;
    state.days[t].min+=focusLen;
    state.total+=1;
    saveState();
    toast('🍅 完成一个番茄！休息一下');
    phase='rest'; remaining=restLen*60;
  }else{
    toast('休息结束，再来一个？');
    phase='focus'; remaining=focusLen*60;
  }
  paint(); renderStats();
}

function start(){ if(running) {stop();return;} running=true; ticker=setInterval(tick,1000); paint(); }
function stop(){ running=false; if(ticker) clearInterval(ticker); ticker=null; paint(); }
function reset(){ stop(); remaining=totalForPhase(); paint(); }

function saveState(){ try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){} }

function beep(){
  try{
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value=phase==='focus'?660:520; o.type='sine';
    g.gain.setValueAtTime(.0001,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.3,ctx.currentTime+.05);
    g.gain.exponentialRampToValueAtTime(.0001,ctx.currentTime+1.1);
    o.start(); o.stop(ctx.currentTime+1.15);
  }catch(e){}
}

function toast(m){const e=$('#toast');e.textContent=m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2800);}

function renderStats(){
  const t=todayStr(), d=state.days[t]||{count:0,min:0};
  $('#todayCount').textContent=d.count;
  $('#todayMin').textContent=d.min;
  $('#totalCount').textContent=state.total;
  // 近7天柱状
  const bars=$('#bars'); bars.innerHTML='';
  const wk=['日','一','二','三','四','五','六'];
  let max=1;
  const days=[];
  for(let i=6;i>=0;i--){const x=new Date();x.setDate(x.getDate()-i);
    const ds=`${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`;
    const c=(state.days[ds]||{}).count||0; max=Math.max(max,c);
    days.push({ds,c,w:wk[x.getDay()],today:ds===t});}
  days.forEach(o=>{
    const col=document.createElement('div');col.className='bar-col'+(o.today?' today':'');
    col.innerHTML=`<div class="bar" style="height:${Math.round(o.c/max*100)}%">${o.c?`<span>${o.c}</span>`:''}</div><div class="day">${o.w}</div>`;
    bars.appendChild(col);
  });
}

// length buttons
document.querySelectorAll('[data-focus]').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('[data-focus]').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); focusLen=+b.dataset.focus;
  if(phase==='focus'&&!running){remaining=focusLen*60;paint();}
});
document.querySelectorAll('[data-rest]').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('[data-rest]').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); restLen=+b.dataset.rest;
  if(phase==='rest'&&!running){remaining=restLen*60;paint();}
});
$('#startBtn').onclick=start;
$('#resetBtn').onclick=reset;

paint(); renderStats();
</script>
</body>
</html>
