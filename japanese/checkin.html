<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日語 · 每日打卡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Shippori+Mincho:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#2b2724; --ink-soft:#6b635c; --paper:#f4efe6; --paper-2:#ece4d6;
    --card:#fbf8f1; --line:#ddd2bf; --accent:#c1543a; --accent-soft:#e8a085;
    --green:#5f7a52; --green-soft:#dfe7d4; --gold:#c89b4a;
    --shadow:0 1px 0 #fff inset, 0 10px 30px -16px rgba(60,45,30,.35);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--paper);color:var(--ink);
    font-family:'Zen Maru Gothic',sans-serif;-webkit-font-smoothing:antialiased}
  body{background-image:radial-gradient(circle at 20% 0%, #f9f4ea 0%, var(--paper) 55%);min-height:100vh;padding:0 0 80px}
  .wrap{max-width:680px;margin:0 auto;padding:0 20px}

  /* header */
  header{padding:38px 0 22px;text-align:center;position:relative}
  .mark{font-family:'Shippori Mincho',serif;font-size:13px;letter-spacing:.5em;
    color:var(--accent);text-transform:uppercase;margin-bottom:6px}
  h1{font-family:'Shippori Mincho',serif;font-weight:700;font-size:42px;letter-spacing:.04em;line-height:1.1}
  .sub{color:var(--ink-soft);font-size:13.5px;margin-top:8px;letter-spacing:.02em}

  /* streak strip */
  .streak{display:flex;gap:14px;justify-content:center;margin:24px 0 8px;flex-wrap:wrap}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:14px 22px;text-align:center;box-shadow:var(--shadow);min-width:104px}
  .stat .n{font-family:'Shippori Mincho',serif;font-size:30px;font-weight:700;color:var(--accent);line-height:1}
  .stat .l{font-size:11.5px;color:var(--ink-soft);margin-top:6px;letter-spacing:.08em}

  /* stage banner */
  .stage{background:linear-gradient(180deg,#fbf8f1,#f3ecdf);border:1px solid var(--line);
    border-radius:16px;padding:18px 20px;margin:18px 0;box-shadow:var(--shadow);
    display:flex;align-items:center;gap:16px}
  .stage .badge{font-family:'Shippori Mincho',serif;font-weight:700;font-size:13px;
    background:var(--accent);color:#fff;border-radius:999px;padding:7px 15px;white-space:nowrap;letter-spacing:.05em}
  .stage .txt b{font-size:15px}
  .stage .txt p{font-size:12.5px;color:var(--ink-soft);margin-top:3px;line-height:1.55}

  /* tasks */
  .tasks{display:flex;flex-direction:column;gap:14px;margin-top:6px}
  .task{background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:18px 18px 16px;box-shadow:var(--shadow);transition:.25s}
  .task.done{background:var(--green-soft);border-color:#c3d2b3}
  .task-head{display:flex;align-items:flex-start;gap:13px;cursor:pointer}
  .check{flex:none;width:26px;height:26px;border-radius:8px;border:2px solid var(--line);
    background:#fff;display:grid;place-items:center;margin-top:1px;transition:.2s}
  .task.done .check{background:var(--green);border-color:var(--green)}
  .check svg{width:15px;height:15px;stroke:#fff;stroke-width:3.4;fill:none;
    stroke-dasharray:20;stroke-dashoffset:20;transition:.3s .05s}
  .task.done .check svg{stroke-dashoffset:0}
  .task-meta{flex:1}
  .task-meta .t{font-weight:700;font-size:16px;display:flex;align-items:center;gap:9px}
  .task-meta .tag{font-size:10.5px;font-weight:500;color:#fff;background:var(--ink-soft);
    border-radius:6px;padding:2px 8px;letter-spacing:.05em}
  .tag.ear{background:var(--accent)} .tag.mouth{background:var(--gold)}
  .tag.eye{background:var(--green)} .tag.hand{background:#8a6d9e}
  .task-meta .d{font-size:13px;color:var(--ink-soft);margin-top:5px;line-height:1.6}
  .mins{flex:none;font-family:'Shippori Mincho',serif;font-size:13px;color:var(--ink-soft);margin-top:2px}

  /* listening lock */
  .lock{margin-top:14px;border-top:1px dashed var(--line);padding-top:14px;display:none}
  .task.lockon .lock{display:block;animation:fade .35s}
  @keyframes fade{from{opacity:0;transform:translateY(-4px)}to{opacity:1}}
  .lock .step{display:flex;gap:11px;align-items:flex-start;padding:9px 0}
  .lock .num{flex:none;width:22px;height:22px;border-radius:50%;background:var(--accent);
    color:#fff;font-size:12px;font-weight:700;display:grid;place-items:center;margin-top:1px}
  .lock .step.locked .num{background:var(--line);color:#fff}
  .lock .step p{font-size:12.5px;line-height:1.55}
  .lock .step p b{color:var(--accent)}
  .lock .step.locked p{color:#b3a79a}
  .lock .mini{margin-top:8px;display:flex;gap:8px;flex-wrap:wrap}
  .lock button{font-family:inherit;font-size:12px;font-weight:500;border:1px solid var(--line);
    background:#fff;color:var(--ink);border-radius:9px;padding:7px 13px;cursor:pointer;transition:.18s}
  .lock button:hover{border-color:var(--accent);color:var(--accent)}
  .lock button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .lock button:disabled{opacity:.4;cursor:not-allowed}
  .lock .grade{margin-top:6px}
  .lock .grade span{font-size:11.5px;color:var(--ink-soft);margin-right:8px}

  /* note box */
  .note{margin-top:18px;background:#fbf8f1;background-color:#fbf8f1;border:1px solid var(--line);
    border-radius:16px;padding:16px 18px;box-shadow:var(--shadow);isolation:isolate}
  .note label{font-weight:700;font-size:14px;display:block;margin-bottom:9px}
  .note textarea{width:100%;border:1px solid var(--line);border-radius:10px;background:#ffffff;
    background-color:#ffffff;font-family:inherit;font-size:14px;padding:11px 13px;resize:vertical;
    min-height:64px;color:#2b2724;position:relative;z-index:2;opacity:1;-webkit-text-fill-color:#2b2724}
  .note textarea:focus{outline:none;border-color:var(--accent);background:#ffffff}

  /* finish */
  .finish{margin-top:22px;text-align:center}
  .finish button{font-family:'Shippori Mincho',serif;font-size:17px;font-weight:600;
    background:var(--accent);color:#fff;border:none;border-radius:14px;padding:15px 44px;
    cursor:pointer;letter-spacing:.08em;box-shadow:0 8px 20px -8px var(--accent);transition:.2s}
  .finish button:hover{transform:translateY(-2px)}
  .finish button:disabled{background:var(--line);box-shadow:none;cursor:not-allowed;transform:none}
  .finish .hint{font-size:12px;color:var(--ink-soft);margin-top:10px}

  /* calendar */
  .cal{margin-top:34px;background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:20px;box-shadow:var(--shadow)}
  .cal h3{font-family:'Shippori Mincho',serif;font-size:16px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
  .cal h3 .reset{font-family:'Zen Maru Gothic';font-size:11px;font-weight:400;color:var(--ink-soft);
    cursor:pointer;text-decoration:underline}
  .grid{display:grid;grid-template-columns:repeat(14,1fr);gap:6px}
  .cell{aspect-ratio:1;border-radius:5px;background:var(--paper-2);border:1px solid #e3dac9}
  .cell.on{background:var(--accent);border-color:var(--accent)}
  .cell.today{box-shadow:0 0 0 2px var(--gold)}
  .cal .legend{font-size:11px;color:var(--ink-soft);margin-top:12px;text-align:right}

  /* journal */
  .journal{margin-top:22px;background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:20px;box-shadow:var(--shadow)}
  .journal h3{font-family:'Shippori Mincho',serif;font-size:16px;margin-bottom:4px;display:flex;align-items:baseline;gap:10px}
  .journal .jcount{font-family:'Zen Maru Gothic';font-size:12px;font-weight:400;color:var(--ink-soft)}
  .jempty{font-size:13px;color:var(--ink-soft);padding:16px 2px;line-height:1.6}
  .jentry{border-top:1px solid var(--line);padding:14px 2px 12px;display:flex;gap:14px}
  .jentry:first-of-type{border-top:none}
  .jdate{flex:none;width:62px;font-family:'Shippori Mincho',serif;font-size:13px;color:var(--accent);
    font-weight:600;line-height:1.4;padding-top:1px}
  .jdate small{display:block;font-family:'Zen Maru Gothic';font-size:10.5px;color:var(--ink-soft);font-weight:400}
  .jtext{flex:1;font-size:14.5px;line-height:1.7;color:var(--ink);white-space:pre-wrap;word-break:break-word}

  /* toast */
  .toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(120px);
    background:var(--ink);color:#fbf8f1;padding:15px 26px;border-radius:14px;font-size:14px;
    box-shadow:0 12px 30px -8px rgba(0,0,0,.4);transition:.4s cubic-bezier(.2,1.3,.4,1);z-index:50;
    font-family:'Shippori Mincho',serif;letter-spacing:.05em}
  .toast.show{transform:translateX(-50%) translateY(0)}
  .err{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:#fdeee9;
    border:1px solid var(--accent-soft);color:var(--accent);padding:9px 16px;border-radius:10px;
    font-size:12.5px;display:none;z-index:60}
</style>
</head>
<body>
<div class="err" id="err"></div>
<div class="wrap">
  <header>
    <div class="mark"><a href="index.html" style="color:inherit;text-decoration:none">← 学習ハブ</a></div>
    <h1>日本語 · 毎日</h1>
    <div class="sub">坚持的秘诀不是完美的起点，是允许自己从粗糙的起点开始</div>
  </header>

  <div class="streak">
    <div class="stat"><div class="n" id="s-streak">0</div><div class="l">连续天数</div></div>
    <div class="stat"><div class="n" id="s-total">0</div><div class="l">累计打卡</div></div>
    <div class="stat"><div class="n" id="s-stage">1</div><div class="l">当前阶段</div></div>
  </div>

  <div class="stage">
    <div class="badge" id="stage-badge">阶段一</div>
    <div class="txt"><b id="stage-name">找回手感</b><p id="stage-desc"></p></div>
  </div>

  <div class="tasks" id="tasks"></div>

  <div class="note">
    <label>今日一句日记 / 挖到的词（写一句就够，错了也没关系）</label>
    <textarea id="diary" placeholder="例：今日はアンキで10個の単語を読みました。"></textarea>
  </div>

  <div class="finish">
    <button id="finishBtn" disabled>完成今日打卡</button>
    <div class="hint" id="finishHint">把上面的任务勾完，按钮就会亮起来</div>
  </div>

  <div class="cal">
    <h3>近 4 周 <span class="reset" id="resetBtn">重置全部记录</span></h3>
    <div class="grid" id="grid"></div>
    <div class="legend">每个方块 = 一天 · 红色为已打卡 · 金框为今天</div>
  </div>

  <div class="journal">
    <h3>日記帳 <span class="jcount" id="jcount"></span></h3>
    <div id="jlist"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORE_KEY='jp_daily_v1';
const $=s=>document.querySelector(s);
const todayStr=()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`};

// ---- 阶段定义：循序渐进，从极低门槛起步 ----
const STAGES=[
  {name:'找回手感',min:0,desc:'前 2 周只求「动起来」。门槛压到最低，先养成每天打开的习惯，别求多。',
   tasks:[
     {id:'srs',icon:'hand',tag:'手',mins:'15分',t:'Anki 补读音',d:'复习 10 张卡，每张先出声读出来再翻面。读不出就按 Again。'},
     {id:'listen',icon:'ear',tag:'耳',mins:'10分',t:'盲听一小段',d:'选一段 30 秒～1 分钟的简单日语（NHK Easy 音频 / 童谣 / 慢速会话）。先盲听，再对文本。',lock:true},
     {id:'shadow',icon:'mouth',tag:'口',mins:'5分',t:'跟读一句',d:'从刚才听的材料里挑一句，跟着读 3 遍，模仿语调。'},
   ]},
  {name:'打基础',min:14,desc:'习惯稳了。开始「句子挖矿」：从读物里挑生词带句子制卡，并把日记升级成造句。',
   tasks:[
     {id:'srs',icon:'hand',tag:'手',mins:'20分',t:'Anki + 复习挖矿卡',d:'复习当天卡组，出声读。'},
     {id:'mine',icon:'eye',tag:'眼',mins:'15分',t:'句子挖矿',d:'读一段 NHK Easy / 简单博客，只挑 3-5 个生词，连同整句话制成卡。'},
     {id:'listen',icon:'ear',tag:'耳',mins:'15分',t:'精听（裸听优先）',d:'1-2 分钟材料。第一轮必须不看文本盲听，反复抠，最后才对文本。',lock:true},
     {id:'shadow',icon:'mouth',tag:'口',mins:'10分',t:'影子跟读',d:'用精听同一段，延迟 1-2 秒跟读。可录音回听对比。'},
   ]},
  {name:'拉听力',min:35,desc:'重心移到耳朵和嘴。引入 JLPT 听力真题（先只听不做题）。每周 italki 开口练即兴表达。',
   tasks:[
     {id:'srs',icon:'hand',tag:'手',mins:'15分',t:'Anki 维持',d:'复习卡组，保持手感。'},
     {id:'listen',icon:'ear',tag:'耳',mins:'25分',t:'真题精听',d:'JLPT 听力真题一段。盲听→抠细节→对文本。先练耳，不纠结答题。',lock:true},
     {id:'shadow',icon:'mouth',tag:'口',mins:'15分',t:'跟读 + 即兴说',d:'跟读后，合上材料用自己的话复述大意，对手机说 1 分钟。'},
     {id:'mine',icon:'eye',tag:'眼',mins:'10分',t:'挖矿（维持）',d:'读到的新词继续制卡，量不必大。'},
   ]},
  {name:'冲证书',min:60,desc:'12 月考前冲刺。切换应试模式：限时刷题、复盘错题题型。每天仍保留裸听维持耳感。',
   tasks:[
     {id:'mock',icon:'hand',tag:'题',mins:'40分',t:'限时刷题',d:'每天轮换一个题型（语法 / 读解 / 听力），严格计时。'},
     {id:'review',icon:'eye',tag:'眼',mins:'20分',t:'错题复盘',d:'订正今天的错题，归类是哪种题型反复错。'},
     {id:'listen',icon:'ear',tag:'耳',mins:'15分',t:'裸听维持',d:'保持每天盲听一小段，别让耳朵掉回去。',lock:true},
   ]},
];

let state=null;

function load(){
  try{
    const r=localStorage.getItem(STORE_KEY);
    state=r? JSON.parse(r):null;
  }catch(e){state=null;}
  if(!state) state={days:{},streak:0,total:0,lastDay:null};
  if(!state.days[todayStr()]) state.days[todayStr()]={checks:{},listen:{},diary:'',done:false};
  render();
}
function save(){
  try{localStorage.setItem(STORE_KEY,JSON.stringify(state));}
  catch(e){showErr('保存失败：浏览器存储被禁用了（请勿用无痕模式）');}
}
function showErr(m){const e=$('#err');e.textContent=m;e.style.display='block';setTimeout(()=>e.style.display='none',3000);}

function curStage(){
  let s=0;for(let i=0;i<STAGES.length;i++) if(state.total>=STAGES[i].min) s=i;
  return s;
}

const checkSVG='<svg viewBox="0 0 24 24"><polyline points="4,12 10,18 20,6"/></svg>';

function render(){
  const day=state.days[todayStr()];
  const si=curStage(), stage=STAGES[si];
  $('#s-streak').textContent=state.streak;
  $('#s-total').textContent=state.total;
  $('#s-stage').textContent=si+1;
  $('#stage-badge').textContent='阶段'+['一','二','三','四'][si];
  $('#stage-name').textContent=stage.name;
  $('#stage-desc').textContent=stage.desc;

  const box=$('#tasks');box.innerHTML='';
  stage.tasks.forEach(tk=>{
    const checked=!!day.checks[tk.id];
    const el=document.createElement('div');
    el.className='task'+(checked?' done':'')+(tk.lock?' lockon':'');
    let lockHTML='';
    if(tk.lock){
      const ls=day.listen[tk.id]||{blind:false,grade:null,text:false};
      lockHTML=`<div class="lock">
        <div class="step ${ls.blind?'':''}">
          <div class="num">1</div>
          <div style="flex:1">
            <p><b>第一轮 · 盲听</b>　不许看文本！放音频，听懂多少算多少。</p>
            <div class="grade"><span>听懂了几成？</span>
              ${[0,30,50,70,90].map(g=>`<button data-lk="${tk.id}" data-g="${g}" class="${ls.grade===g?'on':''}">${g===0?'几乎听不懂':g+'%'}</button>`).join('')}
            </div>
          </div>
        </div>
        <div class="step ${ls.grade===null?'locked':''}">
          <div class="num">2</div>
          <div style="flex:1">
            <p><b>第二轮 · 对文本</b>　${ls.grade===null?'先完成第一轮盲听评分，才能解锁':'现在可以看文本核对了，把没听出的词记下来'}</p>
            <div class="mini"><button data-text="${tk.id}" class="${ls.text?'on':''}" ${ls.grade===null?'disabled':''}>${ls.text?'✓ 已对文本':'我对完文本了'}</button></div>
          </div>
        </div>
      </div>`;
    }
    el.innerHTML=`
      <div class="task-head" data-tk="${tk.id}">
        <div class="check">${checkSVG}</div>
        <div class="task-meta">
          <div class="t">${tk.t} <span class="tag ${tk.icon}">${tk.tag}</span></div>
          <div class="d">${tk.d}</div>
        </div>
        <div class="mins">${tk.mins}</div>
      </div>${lockHTML}`;
    box.appendChild(el);
  });

  // diary
  $('#diary').value=day.diary||'';

  // finish button
  const allDone=stage.tasks.every(tk=>day.checks[tk.id]);
  $('#finishBtn').disabled=!allDone||day.done;
  $('#finishBtn').textContent=day.done?'今日已打卡 ✓':'完成今日打卡';
  $('#finishHint').textContent=day.done?'明天见，保持连续记录！':(allDone?'全部完成，点击打卡！':'把上面的任务勾完，按钮就会亮起来');

  renderCal();
  renderJournal();
  bind();
}

function bind(){
  document.querySelectorAll('.task-head').forEach(h=>{
    h.onclick=e=>{
      if(e.target.closest('.lock')) return;
      const id=h.dataset.tk, day=state.days[todayStr()];
      const tk=STAGES[curStage()].tasks.find(t=>t.id===id);
      // 听力任务必须完成两轮才能勾
      if(tk.lock){
        const ls=day.listen[id]||{};
        if(!day.checks[id] && !(ls.grade!==null && ls.text)){
          showErr('听力任务请先完成「盲听评分」和「对文本」两步');
          return;
        }
      }
      day.checks[id]=!day.checks[id];
      save();render();
    };
  });
  document.querySelectorAll('[data-lk]').forEach(b=>{
    b.onclick=()=>{const id=b.dataset.lk,day=state.days[todayStr()];
      day.listen[id]=day.listen[id]||{grade:null,text:false};
      day.listen[id].grade=+b.dataset.g;save();render();};
  });
  document.querySelectorAll('[data-text]').forEach(b=>{
    b.onclick=()=>{const id=b.dataset.text,day=state.days[todayStr()];
      if(day.listen[id]&&day.listen[id].grade!==null){day.listen[id].text=!day.listen[id].text;save();render();}};
  });
  $('#diary').oninput=e=>{state.days[todayStr()].diary=e.target.value;};
  $('#diary').onblur=()=>{save();renderJournal();};
  $('#finishBtn').onclick=finish;
  $('#resetBtn').onclick=()=>{if(confirm('确定清空所有打卡记录？此操作不可恢复。')){state={days:{},streak:0,total:0,lastDay:null};save();load();}};
}

function finish(){
  const t=todayStr(),day=state.days[t];
  if(day.done) return;
  day.done=true;
  // streak 计算
  const y=new Date();y.setDate(y.getDate()-1);
  const yStr=`${y.getFullYear()}-${String(y.getMonth()+1).padStart(2,'0')}-${String(y.getDate()).padStart(2,'0')}`;
  if(state.lastDay===yStr) state.streak+=1;
  else if(state.lastDay===t){} else state.streak=1;
  state.lastDay=t;
  state.total+=1;
  save();render();
  const msgs=['よくできました！','継続は力なり。','今日もえらい！','一歩前進。','その調子！'];
  toast(msgs[state.streak%msgs.length]+' 连续 '+state.streak+' 天');
}

function toast(m){const e=$('#toast');e.textContent=m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2600);}

function renderJournal(){
  const list=$('#jlist'), count=$('#jcount');
  const wk=['日','一','二','三','四','五','六'];
  const entries=Object.keys(state.days)
    .filter(d=>state.days[d].diary && state.days[d].diary.trim())
    .sort((a,b)=>b.localeCompare(a));
  count.textContent=entries.length?`共 ${entries.length} 篇`:'';
  if(!entries.length){
    list.innerHTML='<div class="jempty">还没有日记。写下今天的第一句吧——哪怕只是「今日も頑張った」。三个月后回看，这些歪歪扭扭的句子就是你的进步证据。</div>';
    return;
  }
  list.innerHTML=entries.map(d=>{
    const dt=new Date(d+'T00:00:00');
    const md=`${dt.getMonth()+1}月${dt.getDate()}日`;
    const isToday=d===todayStr();
    return `<div class="jentry">
      <div class="jdate">${md}${isToday?'<small>今天</small>':`<small>周${wk[dt.getDay()]}</small>`}</div>
      <div class="jtext">${escapeHTML(state.days[d].diary.trim())}</div>
    </div>`;
  }).join('');
}
function escapeHTML(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function renderCal(){
  const g=$('#grid');g.innerHTML='';
  const days=[];const d=new Date();
  for(let i=27;i>=0;i--){const x=new Date();x.setDate(d.getDate()-i);
    days.push(`${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`);}
  days.forEach(ds=>{const c=document.createElement('div');c.className='cell';
    if(state.days[ds]&&state.days[ds].done) c.classList.add('on');
    if(ds===todayStr()) c.classList.add('today');
    g.appendChild(c);});
}

load();
</script>
</body>
